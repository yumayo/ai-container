js_import docker_proxy from /etc/nginx/njs/docker-proxy.js;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen unix:/var/run/docker-proxy/docker.sock;

    client_body_buffer_size 1m;

    # exec関連エンドポイントのみ許可
    # Docker CLIは /v1.XX/ プレフィックスを付けるため、正規表現で対応

    # Docker CLI接続確認
    location ~ ^/(v[\d.]+/)?_ping$ {
        proxy_pass http://docker;
    }

    # Docker CLIバージョン確認
    location ~ ^/(v[\d.]+/)?version$ {
        proxy_pass http://docker;
    }

    # コンテナ一覧（compose execがサービス名からコンテナを特定するのに必要）
    location ~ ^/(v[\d.]+/)?containers/json$ {
        proxy_pass http://docker;
    }

    # コンテナ詳細情報
    location ~ ^/(v[\d.]+/)?containers/[a-zA-Z0-9_.-]+/json$ {
        proxy_pass http://docker;
    }

    # exec作成（njsでコマンドフィルタリング）
    location ~ ^/(v[\d.]+/)?containers/[a-zA-Z0-9_.-]+/exec$ {
        js_content docker_proxy.exec_filter;
    }

    # exec開始（HTTP Upgrade対応）
    location ~ ^/(v[\d.]+/)?exec/[a-zA-Z0-9]+/start$ {
        proxy_pass http://docker;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # exec状態確認
    location ~ ^/(v[\d.]+/)?exec/[a-zA-Z0-9]+/json$ {
        proxy_pass http://docker;
    }

    # TTYリサイズ
    location ~ ^/(v[\d.]+/)?exec/[a-zA-Z0-9]+/resize$ {
        proxy_pass http://docker;
    }

    # それ以外は全て拒否
    location / {
        return 403 '{"message":"Forbidden: only exec operations are allowed"}';
    }

    # njsからinternalRedirectで転送される先
    location @docker_backend {
        proxy_pass http://docker;
    }
}

upstream docker {
    server unix:/var/run/docker.sock;
}
